<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta
			name="viewport"
			content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
		/>
		<link rel="stylesheet" href="./css/Norm_block_model.css" />
		<link rel="stylesheet" href="./css/style.css" />
		<title>QR → Штрихкод v2</title>
	</head>
	<body>
		<style>
			body {
				font-family: sans-serif;
				margin: 20px;
			}
			.app {
				max-width: 400px;
				margin: 0 auto;
				text-align: center;
			}
			#reader {
				width: 100%;
				margin-bottom: 16px;
			}
			#barcodeValue {
				margin-top: 8px;
				font-size: 14px;
				color: #333;
			}
			#zoomRange {
				width: 100%;
			}
		</style>

		<div class="app">
			<h2>QR → Штрихкод v8</h2>

			<div id="reader"></div>

			<div style="margin: 8px 0;">
				<label for="zoomRange">Зум:</label>
				<input id="zoomRange" type="range" min="1" max="3" step="0.1" value="1" />
				<span id="zoomValue">1.0x</span>
			</div>

			<svg id="barcode"></svg>
			<div id="barcodeValue"></div>
		</div>

		<!-- Генератор штрихкода -->
		<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
		<!-- QR сканер -->
		<script src="https://unpkg.com/html5-qrcode@2.3.4/html5-qrcode.min.js"></script>

		<script>
			function extractBarcode(decodedText) {
				const parts = decodedText.split(";");
				if (parts.length > 1 && /^\d+$/.test(parts[1])) {
					return parts[1];
				}
				return null;
			}

			let html5QrCodeScanner = null;
			let videoTrack = null;

			function setupZoomControl() {
				const range = document.getElementById("zoomRange");
				const valueSpan = document.getElementById("zoomValue");

				if (!videoTrack || !videoTrack.getCapabilities) {
					range.disabled = true;
					valueSpan.textContent = "нет зума";
					return;
				}

				const capabilities = videoTrack.getCapabilities();
				if (!capabilities.zoom) {
					range.disabled = true;
					valueSpan.textContent = "нет зума";
					return;
				}

				range.min = capabilities.zoom.min.toString();
				range.max = capabilities.zoom.max.toString();
				range.step = capabilities.zoom.step || "0.1";
				range.value = capabilities.zoom.min.toString();
				valueSpan.textContent = capabilities.zoom.min.toFixed(1) + "x";

				range.oninput = async () => {
					const zoomLevel = parseFloat(range.value);
					valueSpan.textContent = zoomLevel.toFixed(1) + "x";
					try {
						await videoTrack.applyConstraints({
							advanced: [{ zoom: zoomLevel }]
						});
					} catch (e) {
						console.warn("Не удалось применить зум:", e);
					}
				};
			}

			function onScanSuccess(decodedText, decodedResult) {
				const barcodeNumber = extractBarcode(decodedText);

				if (!barcodeNumber) {
					console.warn("Не удалось вытащить штрихкод из строки:", decodedText);
					document.getElementById("barcodeValue").textContent =
						"Ошибка: не найден штрихкод в данных QR";
					return;
				}

				JsBarcode("#barcode", barcodeNumber, {
					format: "CODE128",
					lineColor: "#000",
					width: 2,
					height: 80,
					displayValue: true
				});

				document.getElementById("barcodeValue").textContent = barcodeNumber;
			}

			function onScanError(errorMessage) {
				if (!/No MultiFormat Readers were able to detect the code/.test(errorMessage)) {
					console.warn(errorMessage);
				}
			}

			document.addEventListener("DOMContentLoaded", () => {
				// 1. Создаём сканер с кнопкой "Scan QR" внутри #reader
				html5QrCodeScanner = new Html5QrcodeScanner(
					"reader",
					{
						fps: 15,
						qrbox: { width: 180, height: 180 }
					},
					false
				);

				// 2. Вешаем обработчики и запускаем UI со сканером
				html5QrCodeScanner.render(onScanSuccess, onScanError);

				// 3. Запускаем камеру, чтобы получить MediaStream и VideoTrack
				html5QrCodeScanner.start(
					{ facingMode: "environment" },
					{
						fps: 15,
						qrbox: { width: 180, height: 180 }
					},
					onScanSuccess,
					onScanError
				).then((stream) => {
					const videoTracks = stream.getVideoTracks();
					if (videoTracks.length > 0) {
						videoTrack = videoTracks[0];
						setupZoomControl();
					}
				}).catch(err => {
					console.error("Ошибка старта камеры:", err);
				});
			});
		</script>
	</body>
</html>

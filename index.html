<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta
			name="viewport"
			content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
		/>
		<link rel="stylesheet" href="./css/Norm_block_model.css" />
		<link rel="stylesheet" href="./css/style.css" />
		<title>Document</title>
	</head>
	<body>
		<style>
			body {
				font-family: sans-serif;
				margin: 20px;
			}
			.app {
				max-width: 400px;
				margin: 0 auto;
				text-align: center;
			}
			#reader {
				width: 100%;
				margin-bottom: 16px;
			}
			#barcodeValue {
				margin-top: 8px;
				font-size: 14px;
				color: #333;
			}
		</style>

		<div class="app">
			<h2>QR → Штрихкод v6</h2>

			<div id="reader"></div>

			<div style="margin: 8px 0;">
				<span>Зум:</span>
				<button type="button" id="zoom1">1x</button>
				<button type="button" id="zoom2">2x</button>
				<button type="button" id="zoom4">4x</button>
				<span id="zoomValue">1x</span>
			</div>

			<svg id="barcode"></svg>
			<div id="barcodeValue"></div>
		</div>

		<!-- Генератор штрихкода -->
		<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
		<!-- QR сканер -->
		<script src="https://unpkg.com/html5-qrcode@2.3.4/html5-qrcode.min.js"></script>

		<script>
			function extractBarcode(decodedText) {
				// CEN;4607056587934;129.99;1;6;19.02.26
				const parts = decodedText.split(";");
				if (parts.length > 1 && /^\d+$/.test(parts[1])) {
					return parts[1];
				}
				return null;
			}

			let html5QrCodeScanner = null;
			let videoTrack = null;
			let zoomCaps = null;

			function setupZoomButtons(mediaTrack) {
				const btn1 = document.getElementById("zoom1");
				const btn2 = document.getElementById("zoom2");
				const btn4 = document.getElementById("zoom4");
				const valueSpan = document.getElementById("zoomValue");

				if (!mediaTrack || !mediaTrack.getCapabilities) {
					btn1.disabled = btn2.disabled = btn4.disabled = true;
					valueSpan.textContent = "нет зума";
					return;
				}

				const capabilities = mediaTrack.getCapabilities();
				if (!capabilities.zoom) {
					btn1.disabled = btn2.disabled = btn4.disabled = true;
					valueSpan.textContent = "нет зума";
					return;
				}

				zoomCaps = capabilities;

				async function setZoom(multiplier) {
					const min = zoomCaps.min;
					const max = zoomCaps.max;
					let target;

					if (multiplier === 1) {
						target = min;
					} else if (multiplier === 2) {
						target = Math.min(max, min * 2);
					} else if (multiplier === 4) {
						target = max;
					} else {
						target = min;
					}

					try {
						await mediaTrack.applyConstraints({
							advanced: [{ zoom: target }]
						});
						valueSpan.textContent = multiplier + "x";
					} catch (e) {
						console.warn("Не удалось применить зум:", e);
					}
				}

				btn1.onclick = () => setZoom(1);
				btn2.onclick = () => setZoom(2);
				btn4.onclick = () => setZoom(4);

				valueSpan.textContent = "1x";
			}

			function onScanSuccess(decodedText, decodedResult) {
				const barcodeNumber = extractBarcode(decodedText);

				if (!barcodeNumber) {
					console.warn("Не удалось вытащить штрихкод из строки:", decodedText);
					document.getElementById("barcodeValue").textContent =
						"Ошибка: не найден штрихкод в данных QR";
					return;
				}

				JsBarcode("#barcode", barcodeNumber, {
					format: "CODE128",
					lineColor: "#000",
					width: 2,
					height: 80,
					displayValue: true
				});

				document.getElementById("barcodeValue").textContent = barcodeNumber;
			}

			function onScanError(errorMessage) {
				if (!/No MultiFormat Readers were able to detect the code/.test(errorMessage)) {
					console.warn(errorMessage);
				}
			}

			document.addEventListener("DOMContentLoaded", () => {
				// 1. Создаём новый сканер (с кнопкой "Scan QR" внутри #reader)
				html5QrCodeScanner = new Html5QrcodeScanner(
					"reader",
					{
						fps: 15,
						qrbox: { width: 180, height: 180 }
					},
					false // не скрываем кнопки
				);

				// 2. Запускаем сканер с камеры
				html5QrCodeScanner.render(onScanSuccess, onScanError);

				// 3. После старта камеры получаем VideoTrack для зума
				html5QrCodeScanner.start(
					{ facingMode: "environment" },
					{
						fps: 15,
						qrbox: { width: 180, height: 180 }
					},
					onScanSuccess,
					onScanError
				).then((stream) => {
					videoTrack = stream.getVideoTracks()[0];
					setupZoomButtons(videoTrack);
				}).catch((err) => {
					console.error("Ошибка старта сканера:", err);
				});
			});
		</script>
	</body>
</html>

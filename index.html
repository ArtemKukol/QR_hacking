		<script src="https://unpkg.com/html5-qrcode@2.3.4/html5-qrcode.min.js"></script>

		<script>
			function extractBarcode(decodedText) {
				// ожидаем формат типа: CEN;4607056587934;129.99;1;6;19.02.26
				const parts = decodedText.split(";");
				if (parts.length > 1 && /^\d+$/.test(parts[1])) {
					return parts[1];
				}
				return null;
			}

			let html5QrCode = null;
			let videoTrack = null;
			let zoomCaps = null;

			async function startScanner() {
				const qrRegionId = "reader";
				html5QrCode = new Html5Qrcode(qrRegionId);

				// Стартуем сканер с небольшой областью, чтобы «приблизить» код
				await html5QrCode.start(
					{ facingMode: "environment" },
					{
						fps: 15,
						qrbox: { width: 180, height: 180 } // меньше, чем 250, даёт больше «зум»
					},
					onScanSuccess,
					onScanError
				);

				// Получаем доступ к видеотреку для управления зумом
				const stream = await navigator.mediaDevices.getUserMedia({
					video: { facingMode: "environment" }
				});
				videoTrack = stream.getVideoTracks()[0];

				setupZoomButtons();
			}

					valueSpan.textContent = "нет зума";

					btn1.disabled = btn2.disabled = btn4.disabled = true;
